version: "3.9"

services:
  # ── PostgreSQL database ─────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: wa_exchange_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wauser
      POSTGRES_PASSWORD: wapassword
      POSTGRES_DB: wa_exchange
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wauser -d wa_exchange"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Express backend ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wa_exchange_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://wauser:wapassword@db:5432/wa_exchange"
      JWT_SECRET: "Bo7EKb6ifr/4fHVPK5RmXCnmqjSjOMqxyuGeHpBRGBc="
      JWT_EXPIRES_IN: "8h"
      PORT: 4000
      NODE_ENV: production
      ALLOWED_ORIGIN: "http://localhost:5173"
    ports:
      - "4000:4000"

  # ── Vue frontend (dev server) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wa_exchange_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: "/api"
      BASE_URL: "/app"
    ports:
      - "5173:80"

volumes:
  pgdata:
